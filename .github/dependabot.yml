# Dependabot configuration — sorcerers-stone
# Monitors Python dependencies and GitHub Actions for security updates.
# Grouped updates reduce PR noise; security alerts are always individual.
# Ref: tasks.md Task 1.1

version: 2
updates:

  # Python / pip — weekly, grouped by ecosystem
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns:
          - "*"
    ignore:
      # Never auto-update major versions — review manually
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions — weekly
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
