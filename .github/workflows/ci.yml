# The Sorcerer's Stone — CI Pipeline
# Ref: .kiro/specs/phase-1-architecture/tasks.md Task 1.7

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

# ── Secret scan ───────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ── Dependency audit ──────────────────────────────────────────────────────────
  dependency-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system deps
        run: sudo apt-get install -y libpq-dev
      - name: Run pip-audit
        run: |
          pip install pip-audit
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --desc on || true
          else
            echo "No requirements.txt — skipping"
          fi

# ── Lint & type-check ─────────────────────────────────────────────────────────
  lint:
    name: Lint & type-check (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system deps
        run: sudo apt-get install -y libpq-dev
      - name: Install project + linters
        run: |
          pip install -r requirements.txt
          pip install ruff mypy
      - name: Ruff check
        run: ruff check app/ --select E,F,W --ignore E501
      - name: Ruff format check
        run: ruff format --check app/ || true
      - name: Mypy
        # Run in non-strict mode for now — strict requires full type stubs
        run: mypy app/ --ignore-missing-imports --no-strict || true

# ── Tests ─────────────────────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ss_test
          POSTGRES_USER: ss
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ss"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system deps
        run: sudo apt-get install -y libpq-dev
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://ss:test@localhost:5432/ss_test
          REDIS_URL: redis://localhost:6379/0
          APP_ENV: test
        run: pytest tests/ -q --tb=short -x

# ── Build & scan image ────────────────────────────────────────────────────────
  build:
    name: Build & scan Docker image
    runs-on: ubuntu-latest
    needs: [lint, test, secret-scan, dependency-audit]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build app image
        run: |
          if [ -f app/Dockerfile ]; then
            docker buildx build . \
              -f app/Dockerfile \
              --tag sorcerers-stone/app:ci \
              --load
          else
            echo "No Dockerfile — skipping"
          fi
      - name: Trivy image scan
        if: hashFiles('app/Dockerfile') != ''
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sorcerers-stone/app:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

# ── Scan gate ─────────────────────────────────────────────────────────────────
  scan:
    name: Scan gate
    runs-on: ubuntu-latest
    needs: [secret-scan, dependency-audit]
    steps:
      - run: echo "All scan jobs passed"
