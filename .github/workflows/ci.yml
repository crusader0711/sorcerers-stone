# The Sorcerer's Stone — CI Pipeline
# Ref: .kiro/specs/phase-1-architecture/tasks.md Task 1.7
#
# Stage progression:
#   Phase 1 (now):  secret-scan, dependency-audit, lint (no-op), test (no-op), build (no-op)
#   Phase 2+:       lint enforced, unit/integration tests, coverage gate
#   Phase 6+:       build-image, Trivy scan, GHCR push on tag

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

# ── Secret scan ───────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ── Dependency audit ──────────────────────────────────────────────────────────
  dependency-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run pip-audit
        run: |
          pip install pip-audit
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --strict
          else
            echo "No requirements.txt yet — skipping (Phase 1)"
          fi

# ── Lint & type-check ─────────────────────────────────────────────────────────
  lint:
    name: Lint & type-check (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # No cache: pip here — no requirements file exists yet in Phase 1
      - name: Install linters
        run: pip install ruff mypy
      - name: Ruff lint
        run: |
          if [ -d app ]; then
            ruff check app/ && ruff format --check app/
          else
            echo "No app/ yet — skipping lint (Phase 1)"
          fi
      - name: Mypy type-check
        run: |
          if [ -d app ]; then
            mypy app/ --strict
          else
            echo "No app/ yet — skipping mypy (Phase 1)"
          fi

# ── Tests ─────────────────────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ss_test
          POSTGRES_USER: ss
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ss"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # No cache: pip — no requirements file exists yet in Phase 1
      - name: Install test dependencies
        run: |
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            pip install pytest pytest-cov pyyaml hypothesis
          fi
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://ss:test@localhost:5432/ss_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          if [ -d tests ]; then
            pytest tests/ -q --tb=short
          else
            echo "No tests/ yet — Phase 1 spec-only mode"
          fi

# ── Build & scan image ────────────────────────────────────────────────────────
  build:
    name: Build & scan Docker image
    runs-on: ubuntu-latest
    needs: [lint, test, secret-scan, dependency-audit]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build app image
        run: |
          if [ -f app/Dockerfile ]; then
            docker buildx build ./app \
              --tag sorcerers-stone/app:ci \
              --load
          else
            echo "No Dockerfile yet — skipping (Phase 1)"
          fi
      - name: Trivy image scan
        if: hashFiles('app/Dockerfile') != ''
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sorcerers-stone/app:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

# ── Kiro spec review (PR advisory) ───────────────────────────────────────────
  kiro-review:
    name: Kiro spec review (advisory)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Kiro CLI placeholder
        run: echo "Kiro CLI review — wire per installed version (Phase 7)"

# ── Scan gate (required status check for branch protection) ───────────────────
  scan:
    name: Scan gate
    runs-on: ubuntu-latest
    needs: [secret-scan, dependency-audit]
    steps:
      - run: echo "All scan jobs passed"
