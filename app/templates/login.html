{% extends "base.html" %}
{% set hide_nav = true %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="w-full max-w-sm bg-gray-800 rounded-lg shadow-xl p-8 border border-gray-700">
        <div class="text-center mb-8">
            <svg class="w-12 h-12 mx-auto text-indigo-400" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
            <h1 class="mt-4 text-2xl font-bold text-white">Sorcerer's Stone</h1>
            <p class="mt-1 text-sm text-gray-400">Secure Financial Dashboard</p>
        </div>

        <form
            hx-post="/auth/login"
            hx-target="#login-error"
            hx-swap="innerHTML"
            class="space-y-5"
        >
            {% if error %}
            <div id="login-error" class="bg-red-900/50 border border-red-700 text-red-300 px-4 py-2 rounded text-sm" role="alert">
                {{ error }}
            </div>
            {% else %}
            <div id="login-error"></div>
            {% endif %}

            <div>
                <label for="username" class="block text-sm font-medium text-gray-300 mb-1">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    autocomplete="username"
                    required
                    class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                    placeholder="admin"
                >
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    autocomplete="current-password"
                    required
                    class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                >
            </div>

            <button
                type="submit"
                class="w-full py-2 px-4 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-gray-800 transition"
            >
                Sign In
            </button>
        </form>

        <p class="mt-6 text-center text-xs text-gray-500">
            Access via LAN or WireGuard only
        </p>
    </div>
</div>
{% endblock %}
