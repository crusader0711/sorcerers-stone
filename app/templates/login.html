{% extends "base.html" %}
{% set hide_nav = true %}
{% block title %}Enter the Forge{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-sm">

        <!-- Crest + branding -->
        <div class="text-center mb-8">
            <!-- Crest placeholder (replace with actual SVG/PNG at /static/img/crest.svg) -->
            <div class="w-20 h-20 mx-auto rounded-full bg-gradient-to-br from-amber-500 via-orange-600 to-red-800 flex items-center justify-center shadow-lg shadow-amber-900/30 mb-4">
                <svg class="w-10 h-10 text-white/90" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <h1 class="text-xl font-bold text-white">The Sorcerer's Stone</h1>
            <p class="text-sm text-gray-500 mt-1">Household treasury · Obsidian Forged · v0.7.1-beta</p>
        </div>

        <!-- Login form -->
        <form action="/auth/login" method="post" class="space-y-5">
            {% if error %}
            <div class="bg-red-900/30 border border-red-800 text-red-300 px-4 py-2.5 rounded text-sm" role="alert">
                {{ error }}
            </div>
            {% endif %}

            <div>
                <label for="username" class="block text-xs font-medium text-gray-400 mb-1.5 uppercase tracking-wider">Keeper</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    autocomplete="username"
                    required
                    autofocus
                    class="w-full px-3.5 py-2.5 bg-[#1a1d27] border border-gray-700 rounded-md text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 transition"
                >
            </div>

            <div>
                <label for="password" class="block text-xs font-medium text-gray-400 mb-1.5 uppercase tracking-wider">Passphrase</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    autocomplete="current-password"
                    required
                    class="w-full px-3.5 py-2.5 bg-[#1a1d27] border border-gray-700 rounded-md text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 transition"
                >
            </div>

            <button
                type="submit"
                class="w-full py-2.5 px-4 bg-gradient-to-r from-amber-600 to-orange-700 hover:from-amber-500 hover:to-orange-600 text-white font-medium rounded-md focus:outline-none focus:ring-2 focus:ring-amber-500 focus:ring-offset-2 focus:ring-offset-[#0f1117] transition shadow-lg shadow-amber-900/20"
            >
                Enter the forge
            </button>
        </form>

        <!-- Security badges -->
        <div class="mt-8 flex items-center justify-center gap-4 text-[10px] text-gray-600">
            <span class="flex items-center gap-1">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
                LAN / WireGuard only
            </span>
            <span class="border-l border-gray-800 pl-4 font-mono">TLS 1.3</span>
            <span class="border-l border-gray-800 pl-4 font-mono">Argon2id</span>
            <span class="border-l border-gray-800 pl-4 font-mono text-gray-500">unraid·local</span>
        </div>

    </div>
</div>
{% endblock %}
